plugins {
    id 'java'
}

group = 'dev.akuzoi'
version = '0.1.7'
description = 'Using AI chat plugin for Paper/Spigot 1.20+'

repositories {
    mavenCentral()
    maven {
        name = 'papermc'
        url = uri('https://repo.papermc.io/repository/maven-public/')
    }
}

dependencies {
    compileOnly 'io.papermc.paper:paper-api:1.20.1-R0.1-SNAPSHOT'
    implementation 'org.xerial:sqlite-jdbc:3.46.1.3'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

processResources {
    filesMatching('plugin.yml') {
        expand(version: project.version, description: project.description)
    }
}

tasks.jar {
    destinationDirectory = layout.projectDirectory.dir('target')
    archiveBaseName = 'AkuzoiAI-bukkit'
}
